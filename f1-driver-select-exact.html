<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 F1 Drivers Custom Select</title>
<style>
@import url(https://fonts.bunny.net/css?family=jura:300,500);
@layer base, controls, demo;

@layer demo {
  :root {
    interpolate-size: allow-keywords;
    --transition-duration: 500ms;

    --select-width: 100px;
    --select-padding: .25rem .75rem;
    --select-radius: min(5px,10px);
    --select-text-color: light-dark(rgb(113, 113, 123),rgb(245 245 245));
    --select-bg-color: light-dark(rgb(202, 213, 226), rgb(255 255 255 / .05));
    --select-bg-color-hover: light-dark(rgb(228 228 231),rgb(0 105 168));
    --select-border-color: 1px solid light-dark(rgb(212 212 216),rgb(0 105 168));

    --picker-size: min(90vw, 600px);
    --picker-bg-color: rgb(0 0 0 /.5);
    --picker-border: 1px solid var(--clr-lines);
    --picker-padding: 20px;
    --picker-gap: 20px;
    --picker-radius: 20px;

    --option-size: var(--select-width);
    --option-padding: 0;
    --option-bg-color: light-dark(rgb(202, 213, 226), rgb(255 255 255 / .05));
    --option-bg-color-hover: rgb(0 105 168 / 1);
    --option-bg-color-selected: dodgerblue;
    --option-border: none;
    --option-border-color: var(--clr-lines);
    --option-font-size: .8rem;
    --option-text-color: light-dark(rgb(10, 113, 123), rgb(255 255 255));
    --option-text-color-hover: white;
    --option-text-color-selected: white;
    --option-radius: min(5px,10px);

    --selected-element-radius: var(--select-radius);
    --selected-element-padding: 1rem;
    --selected-element-bg-color: rgb(255 255 255 / .1);
    --selected-element-bg-color-hover: rgb(0 105 168 / 1);
    --selected-element-text-color: var(--option-text-color);
    --selected-element-border-color: var(--option-border-color);
  }

  body {
    background-image: radial-gradient(in oklch, rgb(78 21 22), black);
  }

  select {
    width: var(--select-width);
    margin-inline: auto;
    background-color: var(--select-bg-color);
    color: var(--select-text-color);
    padding: var(--select-padding);
    border: var(--select-border-color);
    border-radius: var(--select-radius);
    transition:
      background-color var(--transition-duration) ease-in-out,
      outline var(--transition-duration) ease-in-out,
      scale var(--transition-duration) ease-in-out;
    &:hover, &:focus, &:active {
      background-color: var(--select-bg-color-hover);
    }
    &:focus-visible {
      outline: 1px dashed dodgerblue;
      outline-offset: 5px;
    }
    selectedcontent > svg,
    option:first-of-type {
      display: none;
    }
  }

  label {
    transition: opacity 150ms ease-in-out;
  }

  @supports (appearance: base-select) {
    &:has(select:open) label {
      opacity: 0;
    }
    select, ::picker(select) {
      appearance: base-select;
    }
    select {
      position: relative;
      aspect-ratio: 1;
      border: none;
      padding: 0;
      border-radius: var(--selected-element-radius);
      &::picker-icon {
        display: none;
      }
      &::picker(select) {
        pointer-events: none;
        position: relative;
        position-area: span-all;
        width: var(--picker-size);
        border: none;
        opacity: 0;
        scale: 0;
        padding: var(--picker-padding);
        background: var(--picker-bg-color);
        border-radius: var(--picker-radius);
        transition: all var(--transition-duration) allow-discrete;
        backdrop-filter: blur(2px);
        overflow: hidden;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        @media (width > 600px) {
          grid-template-columns: repeat(5, 1fr);
        }
        gap: var(--picker-gap);
        grid-auto-flow: row dense;
      }
      &:open::picker(select) {
        pointer-events: auto;
        opacity: 1;
        scale: 1;
        @starting-style {
          opacity: 0;
          scale: .4;
        }
      }
      selectedcontent svg,
      img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: inherit;
        transition:
          scale calc(var(--transition-duration) / 2) ease-in-out,
          filter var(--transition-duration) ease-in-out;
      }
      img {
        transform-origin: bottom;
        scale: var(--img-scale, 1);
        filter:
          grayscale(var(--img-filter, 1))
          drop-shadow(2px 2px 1px var(--img-shadow-color, transparent));
      }
      option, selectedcontent {
        cursor: pointer;
        position: relative;
        color: attr(data-color type(<color>));
        padding: var(--option-padding);
        border: 1px solid;
        border-radius: var(--option-radius);
        background-color: var(--option-bg-color);
        outline: 1px dashed transparent;
        isolation: isolate;
        clip-path: polygon(0 -50%, 100% -50%, 100% 100%, 0 100%);
        transition:
          outline var(--transition-duration) ease-in-out,
          opacity var(--transition-duration) ease-in-out,
          scale calc(var(--transition-duration) / 2) ease-in-out,
          background-color var(--transition-duration) ease-in-out;
        &::before, &::after, span {
          position: absolute;
          inset: auto 0 0;
          padding: .35em;
          color: white;
          text-align: center;
          text-wrap: wrap;
          font-size: .8rem;
          transition: all calc(var(--transition-duration) / 2) ease-in-out;
          z-index: 2;
        }
        &:not(:nth-child(2))::before {
          content: '\00A0';
          background-color: rgb(1 1 1 / var(--data-bg-opacity, 0.9));
          backdrop-filter: blur(3px);
          border-top: 1px solid attr(data-color type(<color>));
          border-radius: 0 0 var(--option-radius) var(--option-radius);
          z-index: 1;
        }
        span {
          opacity: 1;
          translate: var(--data-name-x, 100%) 0;
        }
        &::after {
          content: attr(data-team);
          translate: var(--data-team-x, 0) 0;
        }
      }
      selectedcontent {
        position: absolute;
        inset: 0;
        display: grid;
        place-content: center;
        border-color: var(--selected-element-border-color);
        background-color: var(--selected-element-bg-color);
        color: var(--selected-element-text-color);
        transform-origin: center;
        --data-name-x: 0;
        img { filter: none; }
        svg { translate: 0 -10px; }
      }
      &:open selectedcontent {
        scale: 0;
      }
      option {
        &:first-of-type {
          grid-column: 2;
          grid-row: 4 / span 2;
          aspect-ratio: 1;
          align-self: center;
          scale: .8;
          @media (width > 600px) {
            grid-column: 3;
            grid-row: 3;
          }
          display: grid;
          place-content: center;
          opacity: 1;
          svg { display: block; }
          span { display: none; }
          &:hover { background: var(--option-bg-color-hover); }
        }
        &::checkmark { display: none; }
        &:checked { background-color: attr(data-color type(<color>)); }
      }
      option:hover,
      option:focus-visible {
        --option-bg-color: attr(data-color type(<color>));
        --img-filter: 0;
        --img-scale: 1.18;
        --img-shadow-color: white;
        --data-team-x: -100%;
        --data-name-x: 0;
        --data-bg-opacity: .9;
        &:focus-visible {
          outline: 1px dashed white;
          outline-offset: -5px;
        }
      }
    }
  }
}

@layer base {
  * { box-sizing: border-box; }
  :root {
    color-scheme: dark;
    --bg-dark: rgb(12, 12, 12);
    --bg-light: rgb(248, 244, 238);
    --txt-light: rgb(10, 10, 10);
    --txt-dark: rgb(245, 245, 245);
    --line-light: rgba(0 0 0 / .25);
    --line-dark: rgba(255 255 255 / .25);
    --clr-bg: light-dark(var(--bg-light), var(--bg-dark));
    --clr-txt: light-dark(var(--txt-light), var(--txt-dark));
    --clr-lines: light-dark(var(--line-light), var(--line-dark));
  }
  body {
    background-color: var(--clr-bg);
    color: var(--clr-txt);
    min-height: 100svh;
    margin: 0;
    padding: 2rem;
    font-family: "Jura", sans-serif;
    font-size: 1rem;
    line-height: 1.5;
    display: grid;
    place-content: center;
    gap: 1rem;
    @supports not (appearance: base-select) {
      &::before {
        content: "Sorry, your browser doesn't support custom select styling";
        position: fixed;
        top: 1rem;
        left: 50%;
        translate: -50% 0;
        font-size: 0.8rem;
        color: white;
        background-color: red;
        padding: .5em 1em;
      }
    }
    h1 { font-size: 1.2rem; margin: 0; }
  }
}
</style>
</head>
