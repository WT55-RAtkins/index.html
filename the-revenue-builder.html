<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Revenue Builder</title>
<style>
@import url("https://fonts.cdnfonts.com/css/mona-sans");

*, *::before, *::after { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

body {
  margin: 0;
  padding: 1rem;
  background: transparent;
  font-family: "Mona Sans", "Mona-Sans", sans-serif;
}

/* ── Icon grid ── */
.icon-grid {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.app-icon-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 16px 12px;
  width: 110px;
  transition: background 0.2s, transform 0.15s, border-color 0.2s;
  flex-shrink: 0;
}

.app-icon-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.2);
  transform: translateY(-2px);
}

.app-icon-btn img {
  width: 52px;
  height: 52px;
  border-radius: 13px;
  object-fit: cover;
  display: block;
}

.app-icon-btn span {
  font-size: 12px;
  color: rgba(255,255,255,0.8);
  text-align: center;
  font-weight: 500;
  line-height: 1.2;
}

/* ── Full screen card scene ── */
#card-scene {
  position: fixed;
  inset: 0;
  display: none;
  place-content: center;
  z-index: 1000;
  background: linear-gradient(180deg, #2e2e3e 0%, #1a1a2a 100%);
  overflow-y: auto;
  padding: 2rem 1rem;
}

#card-scene.visible { display: grid; }

/* Accent cards */
.accents {
  user-select: none;
  pointer-events: none;
  position: fixed;
  inset: 0;
  z-index: 1;
  overflow: hidden;
}

.acc-card {
  width: min(620px, 90vw);
  height: min(620px, 75vh);
  background: rgba(238,238,238,0.03);
  opacity: 0.45;
  position: absolute;
  left: 0; right: 0;
  top: 50%; translate: 0 -50%;
  margin: auto;
  border-radius: 22px;
  box-shadow: inset 0 2px 2px 0 rgba(224,201,178,0.1), inset 0 -2px 2px 0 rgba(0,0,0,0.08);
  transform-origin: 50% 50%;
}

.acc-card:nth-child(1) { animation: wobble 18s ease-in-out infinite; }
.acc-card:nth-child(2) { animation: wobble 22s ease-in-out -6s infinite reverse; }
.acc-card:nth-child(3) { animation: wobble 26s ease-in-out -18s infinite; }

.top-light {
  position: fixed;
  left: 50%;
  translate: -50% 0;
  top: 0;
  width: min(280px, 55vw);
  height: 5px;
  border-radius: 0 0 10px 10px;
  background: #fffef9;
  box-shadow:
    0 0px 1px 1px #ffffff88,
    0 1px 2px 1px #ffffff55,
    0 2px 6px 1px #ffffff44,
    0 4px 12px 0px #ffffff66,
    0 12px 20px 12px #ffffff22;
}

/* Main card */
.card {
  position: relative;
  margin: auto;
  width: min(560px, 92vw);
  border-radius: 20px;
  background: linear-gradient(180deg, #292935cc 0%, #191922ee 60%);
  backdrop-filter: blur(6px);
  box-shadow: inset 0 2px 2px 0 #e7c4a055, inset 0 -2px 2px 0 #0003;
  padding: 28px;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.card-top {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  margin-bottom: 16px;
}

.card-icon-wrap img {
  width: 72px;
  height: 72px;
  border-radius: 18px;
  object-fit: cover;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  display: block;
}

.card-meta { flex: 1; }

.card-category {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.35);
  margin-bottom: 5px;
}

.card-name {
  font-size: 24px;
  font-weight: 700;
  color: #eee;
  margin: 0 0 8px;
  line-height: 1.1;
}

.card-desc {
  font-size: 0.88rem;
  color: rgba(255,255,255,0.6);
  line-height: 1.6;
  margin: 0;
}

/* Screenshot carousel */
.card-carousel { margin-bottom: 16px; }

.carousel-track {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  gap: 10px;
  border-radius: 12px;
}

.carousel-track::-webkit-scrollbar { display: none; }

.carousel-slide {
  flex: 0 0 100%;
  scroll-snap-align: start;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  background: #111;
  height: 280px;
}

.carousel-slide img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  object-position: top left;
}

.carousel-slide.no-screenshot {
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.2);
  font-size: 0.8rem;
}

.carousel-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 8px;
}

.carousel-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  transition: background 0.2s, transform 0.2s;
  cursor: pointer;
}

.carousel-dot.active {
  background: white;
  transform: scale(1.2);
}

/* App switcher buttons */
.app-switcher {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.switcher-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}

.switcher-btn img {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  object-fit: cover;
}

.switcher-btn.active {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.35);
  color: white;
}

.switcher-btn:hover {
  background: rgba(255,255,255,0.12);
  color: white;
}

/* Card actions */
.card-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}

.btn-signin {
  border-radius: 100px;
  padding: 10px 30px;
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.2), inset 120px 0 100px -100px rgba(0,0,0,0.6);
  transition: all 0.3s;
  cursor: pointer;
  color: white;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 500;
  text-decoration: none;
  display: inline-block;
  border: none;
}

.btn-signin:hover {
  background: rgba(255,255,255,0.2);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.3), inset 200px 0 100px -100px rgba(0,0,0,0.5);
}

.btn-close {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 100px;
  padding: 8px 18px;
  cursor: pointer;
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  font-family: inherit;
  transition: background 0.2s;
}

.btn-close:hover {
  background: rgba(255,255,255,0.14);
  color: white;
}

@keyframes wobble {
  0%   { transform: translateX(6px)   translateY(10px)  rotate(-2deg) scale(1); }
  20%  { transform: translateX(-20px) translateY(-6px)  rotate(3deg)  scale(1.01); }
  60%  { transform: translateX(14px)  translateY(8px)   rotate(-4deg) scale(1); }
  80%  { transform: translateX(-18px) translateY(-10px) rotate(5deg)  scale(0.98); }
  100% { transform: translateX(6px)   translateY(10px)  rotate(-2deg) scale(1); }
}
</style>
</head>
<body>

<!-- Icon grid -->
<div class="icon-grid" id="icon-grid"></div>

<!-- Card scene -->
<div id="card-scene">
  <div class="accents">
    <div class="acc-card"></div>
    <div class="acc-card"></div>
    <div class="acc-card"></div>
    <div class="top-light"></div>
  </div>
  <div class="card">
    <!-- App switcher -->
    <div class="app-switcher" id="app-switcher"></div>

    <!-- App content -->
    <div class="card-top">
      <div class="card-icon-wrap"><img id="card-icon" src="" alt=""></div>
      <div class="card-meta">
        <div class="card-name" id="card-name"></div>
        <p class="card-desc" id="card-desc"></p>
      </div>
    </div>

    <!-- Screenshot carousel -->
    <div class="card-carousel" id="card-carousel"></div>

    <!-- Actions -->
    <div class="card-actions">
      <button class="btn-close" id="close-btn">✕ Close</button>
      <a class="btn-signin" id="signin-btn" href="#">Sign in →</a>
    </div>
  </div>
</div>

        }
];

let currentApp = 0;
const scene = document.getElementById('card-scene');
const grid = document.getElementById('icon-grid');
const switcher = document.getElementById('app-switcher');

// Build icon grid
APPS.forEach((app, i) => {
  const btn = document.createElement('div');
  btn.className = 'app-icon-btn';
  btn.innerHTML = `<img src="${app.icon}" alt="${app.name}"><span>${app.name}</span>`;
  btn.addEventListener('click', () => openCard(i));
  grid.appendChild(btn);
});

// Build switcher buttons
APPS.forEach((app, i) => {
  const btn = document.createElement('button');
  btn.className = 'switcher-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = `<img src="${app.icon}" alt="${app.name}">${app.name}`;
  btn.addEventListener('click', () => switchApp(i));
  switcher.appendChild(btn);
});

function openCard(index) {
  currentApp = index;
  renderApp(index);
  scene.classList.add('visible');
  window.scrollTo(0, 0);
}

function switchApp(index) {
  currentApp = index;
  renderApp(index);
  // Update switcher active state
  document.querySelectorAll('.switcher-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });
}

function renderApp(index) {
  const app = APPS[index];

  document.getElementById('card-icon').src = app.icon;
  document.getElementById('card-icon').alt = app.name;
  document.getElementById('card-name').textContent = app.name;
  document.getElementById('card-desc').textContent = app.desc;
  document.getElementById('signin-btn').href = '/' + app.value;

  // Update switcher
  document.querySelectorAll('.switcher-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });

  // Render carousel
  const carousel = document.getElementById('card-carousel');
  if (!app.screenshots || app.screenshots.length === 0) {
    carousel.innerHTML = '<div class="carousel-slide no-screenshot">Screenshot coming soon</div>';
    return;
  }

  const slides = app.screenshots.map(src =>
    `<div class="carousel-slide"><img src="${src}" alt="${app.name}"></div>`
  ).join('');

  const dots = app.screenshots.length > 1
    ? `<div class="carousel-dots">${app.screenshots.map((_, i) =>
        `<div class="carousel-dot ${i===0?'active'}"></div>`
      ).join('')}</div>`
    : '';

  carousel.innerHTML = `<div class="carousel-track" id="carousel-track">${slides}</div>${dots}`;

  if (app.screenshots.length > 1) {
    const track = carousel.querySelector('#carousel-track');
    track.scrollTo({ left: 0, behavior: 'instant' });
    carousel.querySelectorAll('.carousel-dot').forEach((dot, i) => {
      dot.addEventListener('click', () => {
        track.scrollTo({ left: track.offsetWidth * i, behavior: 'smooth' });
      });
    });
    track.addEventListener('scroll', () => {
      const i = Math.round(track.scrollLeft / track.offsetWidth);
      carousel.querySelectorAll('.carousel-dot').forEach((d, idx) => {
        d.classList.toggle('active', idx === i);
      });
    }, { passive: true });
  }
}

document.getElementById('close-btn').addEventListener('click', () => {
  scene.classList.remove('visible');
});
</script>
