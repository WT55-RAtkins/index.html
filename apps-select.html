<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps</title>
<style>
@import url('https://fonts.bunny.net/css?family=jura:300,500');
@layer base, demo;

@layer demo {
  :root {
    interpolate-size: allow-keywords;
    --transition-duration: 400ms;
    --select-width: 110px;
    --select-radius: 12px;
    --picker-size: min(92vw, 680px);
    --picker-bg-color: rgb(15 15 25 / 0.92);
    --picker-padding: 20px;
    --picker-gap: 14px;
    --picker-radius: 20px;
    --option-radius: 10px;
    --option-bg-color: rgb(255 255 255 / .06);
    --option-bg-color-hover: rgb(255 255 255 / .12);
    --selected-element-bg-color: rgb(255 255 255 / .07);
    --selected-element-border-color: rgba(255,255,255,0.15);
  }

  body {
    background: #0f0f1a;
  }

  select {
    width: var(--select-width);
    margin-inline: auto;
    background-color: var(--option-bg-color);
    color: white;
    padding: .25rem .75rem;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--select-radius);
    font-family: inherit;
    transition: background-color var(--transition-duration) ease-in-out;
    &:hover, &:focus, &:active {
      background-color: var(--option-bg-color-hover);
    }
    selectedcontent > svg,
    option:first-of-type {
      display: none;
    }
  }

  label { transition: opacity 150ms ease-in-out; }

  @supports (appearance: base-select) {
    &:has(select:open) label { opacity: 0; }

    select, ::picker(select) { appearance: base-select; }

    select {
      position: relative;
      aspect-ratio: 1;
      border: none;
      padding: 0;
      border-radius: var(--select-radius);

      &::picker-icon { display: none; }

      &::picker(select) {
        pointer-events: none;
        position: relative;
        position-area: span-all;
        width: var(--picker-size);
        border: none;
        opacity: 0;
        scale: 0;
        padding: var(--picker-padding);
        background: var(--picker-bg-color);
        border-radius: var(--picker-radius);
        transition: all var(--transition-duration) allow-discrete;
        backdrop-filter: blur(16px);
        overflow: hidden;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        @media (width > 600px) {
          grid-template-columns: repeat(4, 1fr);
        }
        gap: var(--picker-gap);
        grid-auto-flow: row dense;
      }

      &:open::picker(select) {
        pointer-events: auto;
        opacity: 1;
        scale: 1;
        @starting-style { opacity: 0; scale: .4; }
      }

      selectedcontent svg, img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: inherit;
        transition:
          scale calc(var(--transition-duration) / 2) ease-in-out,
          filter var(--transition-duration) ease-in-out;
      }

      img {
        transform-origin: bottom;
        scale: var(--img-scale, 1);
        filter: grayscale(var(--img-filter, 0)) drop-shadow(2px 2px 1px var(--img-shadow-color, transparent));
      }

      option, selectedcontent {
        cursor: pointer;
        position: relative;
        padding: 0;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: var(--option-radius);
        background-color: var(--option-bg-color);
        outline: 1px dashed transparent;
        isolation: isolate;
        clip-path: polygon(0 -50%, 100% -50%, 100% 100%, 0 100%);
        transition:
          outline var(--transition-duration) ease-in-out,
          scale calc(var(--transition-duration) / 2) ease-in-out,
          background-color var(--transition-duration) ease-in-out;

        &::before, &::after, span {
          position: absolute;
          inset: auto 0 0;
          padding: .35em;
          color: white;
          text-align: center;
          text-wrap: wrap;
          font-size: .75rem;
          transition: all calc(var(--transition-duration) / 2) ease-in-out;
          z-index: 2;
        }

        &:not(:nth-child(2))::before {
          content: '\00A0';
          background-color: rgb(0 0 0 / var(--data-bg-opacity, 0.75));
          backdrop-filter: blur(3px);
          border-top: 1px solid attr(data-color type(<color>));
          border-radius: 0 0 var(--option-radius) var(--option-radius);
          z-index: 1;
        }

        span {
          opacity: 1;
          translate: var(--data-name-x, 100%) 0;
          font-weight: 500;
        }

        &::after {
          content: attr(data-category);
          translate: var(--data-team-x, 0) 0;
          font-size: .65rem;
          opacity: 0.7;
        }
      }

      selectedcontent {
        position: absolute;
        inset: 0;
        display: grid;
        place-content: center;
        border-color: var(--selected-element-border-color);
        background-color: var(--selected-element-bg-color);
        color: white;
        transform-origin: center;
        --data-name-x: 0;
        img { filter: none; }
        svg { translate: 0 -10px; }
      }

      &:open selectedcontent { scale: 0; }

      option {
        &:first-of-type {
          grid-column: 2;
          grid-row: 3;
          @media (width > 600px) {
            grid-column: 2;
            grid-row: 3;
          }
          aspect-ratio: 1;
          align-self: center;
          scale: .8;
          display: grid;
          place-content: center;
          opacity: 1;
          svg { display: block; }
          span { display: none; }
          &:hover { background: var(--option-bg-color-hover); }
        }

        &::checkmark { display: none; }
        &:checked { background-color: attr(data-color type(<color>)); }
      }

      option:hover, option:focus-visible {
        --option-bg-color: attr(data-color type(<color>));
        --img-scale: 1.12;
        --img-shadow-color: rgba(255,255,255,0.3);
        --data-team-x: -100%;
        --data-name-x: 0;
        --data-bg-opacity: .85;
        &:focus-visible {
          outline: 1px dashed white;
          outline-offset: -5px;
        }
      }
    }
  }
}

@layer base {
  * { box-sizing: border-box; }
  :root {
    color-scheme: dark;
  }
  body {
    color: white;
    min-height: 100svh;
    margin: 0;
    padding: 2rem;
    font-family: "Jura", sans-serif;
    font-size: 1rem;
    line-height: 1.5;
    display: grid;
    place-content: center;
    gap: 1rem;
    @supports not (appearance: base-select) {
      &::before {
        content: "This app picker requires Chrome 135+";
        position: fixed;
        top: 1rem;
        left: 50%;
        translate: -50% 0;
        font-size: 0.8rem;
        color: white;
        background-color: #e11d48;
        padding: .5em 1em;
        border-radius: 6px;
      }
    }
  }
}
</style>
</head>
<body>

<label for="select-app">Choose an app:</label>
<select id="select-app">
  <button>
    <selectedcontent></selectedcontent>
  </button>

  <!-- close button -->
  <option>
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
      <path d="M18 6l-12 12" /><path d="M6 6l12 12" />
    </svg>
    <span>close</span>
  </option>

  <!-- LEAD WITH CLARITY -->
  <option data-category="Lead with Clarity" data-color="#4f46e5" value="portfolio" data-desc="Business health in 30 seconds. Pipeline, commitments, resources, revenue.">
    <img src="https://api.iconify.design/heroicons:briefcase.svg?color=white&width=80&height=80" alt="Portfolio" style="background:#4f46e5;padding:18px">
    <span>Portfolio</span>
  </option>

  <option data-category="Lead with Clarity" data-color="#7c3aed" value="crm" data-desc="Every client. Fully known. History, opportunities, active work — connected.">
    <img src="https://api.iconify.design/heroicons:user-group.svg?color=white&width=80&height=80" alt="CRM" style="background:#7c3aed;padding:18px">
    <span>CRM</span>
  </option>

  <option data-category="Lead with Clarity" data-color="#0891b2" value="goals" data-desc="Strategy everyone can see. Owned, tracked and on target.">
    <img src="https://api.iconify.design/heroicons:chart-bar.svg?color=white&width=80&height=80" alt="Goals" style="background:#0891b2;padding:18px">
    <span>Goals</span>
  </option>

  <!-- OPERATE WITH PRECISION -->
  <option data-category="Operate with Precision" data-color="#d97706" value="it-inventory" data-desc="Stop paying for what nobody uses. Every licence, device and subscription — accounted for.">
    <img src="https://api.iconify.design/heroicons:computer-desktop.svg?color=white&width=80&height=80" alt="IT Inventory" style="background:#d97706;padding:18px">
    <span>IT Inventory</span>
  </option>

  <option data-category="Operate with Precision" data-color="#ea580c" value="equipment" data-desc="Nothing overdue. Nothing missed. Every asset inspected and fit for service.">
    <img src="https://api.iconify.design/heroicons:cube.svg?color=white&width=80&height=80" alt="Equipment" style="background:#ea580c;padding:18px">
    <span>Equipment</span>
  </option>

  <option data-category="Operate with Precision" data-color="#ca8a04" value="letters" data-desc="Documents that write themselves. Your data, your templates, done.">
    <img src="https://api.iconify.design/heroicons:document-text.svg?color=white&width=80&height=80" alt="Letters & Docs" style="background:#ca8a04;padding:18px">
    <span>Letters &amp; Docs</span>
  </option>

  <option data-category="Operate with Precision" data-color="#dc2626" value="forms" data-desc="Ask once. Get it right. No chasing, no gaps, no re-entering data.">
    <img src="https://api.iconify.design/heroicons:clipboard-document-list.svg?color=white&width=80&height=80" alt="Forms & Surveys" style="background:#dc2626;padding:18px">
    <span>Forms &amp; Surveys</span>
  </option>

  <!-- DEVELOP YOUR PEOPLE -->
  <option data-category="Develop your People" data-color="#059669" value="employees" data-desc="One complete record for every person. Employment, compliance, documents — nothing missing, nothing scattered.">
    <img src="https://api.iconify.design/heroicons:identification.svg?color=white&width=80&height=80" alt="Employees" style="background:#059669;padding:18px">
    <span>Employees</span>
  </option>

  <option data-category="Develop your People" data-color="#0284c7" value="apply" data-desc="Hire better, faster. From first application to signed contract.">
    <img src="https://api.iconify.design/heroicons:user-plus.svg?color=white&width=80&height=80" alt="Apply" style="background:#0284c7;padding:18px">
    <span>Apply</span>
  </option>

  <option data-category="Develop your People" data-color="#0d9488" value="staffing" data-desc="Every shift filled, every worker paid correctly. Rosters, check-ins and calculated pay.">
    <img src="https://api.iconify.design/heroicons:calendar-days.svg?color=white&width=80&height=80" alt="Staffing" style="background:#0d9488;padding:18px">
    <span>Staffing</span>
  </option>

  <!-- GROW NEW REVENUE -->
  <option data-category="Grow New Revenue" data-color="#7c3aed" value="booking" data-desc="Clients book, pay and show up. Your availability, online — no back and forth.">
    <img src="https://api.iconify.design/heroicons:calendar.svg?color=white&width=80&height=80" alt="Booking" style="background:#7c3aed;padding:18px">
    <span>Booking</span>
  </option>

  <option data-category="Grow New Revenue" data-color="#b45309" value="lms" data-desc="Sell what you know. Branded courses, certifications and training your clients pay for.">
    <img src="https://api.iconify.design/heroicons:academic-cap.svg?color=white&width=80&height=80" alt="LMS" style="background:#b45309;padding:18px">
    <span>LMS</span>
  </option>

  <option data-category="Grow New Revenue" data-color="#6d28d9" value="support" data-desc="Your best answers, available 24/7. An AI that knows your business — on your website.">
    <img src="https://api.iconify.design/heroicons:chat-bubble-left-right.svg?color=white&width=80&height=80" alt="Support" style="background:#6d28d9;padding:18px">
    <span>Support</span>
  </option>

</select>

<!-- App detail card — shown after selection -->
<div id="app-card" style="display:none; max-width:420px; margin:1.5rem auto 0; background:rgb(255 255 255 / .07); border:1px solid rgba(255,255,255,0.12); border-radius:16px; padding:1.5rem; font-family:'Jura',sans-serif;">
  <div style="display:flex; align-items:center; gap:16px; margin-bottom:14px;">
    <img id="card-icon" src="" alt="" style="width:56px;height:56px;border-radius:12px;object-fit:cover;flex-shrink:0">
    <div>
      <div id="card-name" style="font-size:18px;font-weight:500;color:white;"></div>
      <div id="card-category" style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;text-transform:uppercase;letter-spacing:0.08em;"></div>
    </div>
  </div>
  <div id="card-desc" style="font-size:14px;color:rgba(255,255,255,0.75);line-height:1.6;border-top:1px solid rgba(255,255,255,0.1);padding-top:12px;"></div>
  <a id="card-link" href="#" style="display:inline-block;margin-top:14px;padding:8px 20px;background:white;color:#0f0f1a;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;">Open app →</a>
</div>

<script>
  const sel = document.getElementById('select-app');
  const card = document.getElementById('app-card');
  const cardIcon = document.getElementById('card-icon');
  const cardName = document.getElementById('card-name');
  const cardCat = document.getElementById('card-category');
  const cardDesc = document.getElementById('card-desc');
  const cardLink = document.getElementById('card-link');

  sel.addEventListener('change', () => {
    const opt = sel.options[sel.selectedIndex];
    if (!opt || !opt.value) { card.style.display = 'none'; return; }

    const img = opt.querySelector('img');
    cardIcon.src = img ? img.src : '';
    cardIcon.style.background = opt.dataset.color || '#333';
    cardName.textContent = opt.querySelector('span')?.textContent || opt.value;
    cardCat.textContent = opt.dataset.category || '';
    cardDesc.textContent = opt.dataset.desc || '';
    cardLink.href = '/' + opt.value;
    card.style.display = 'block';
    card.style.borderColor = opt.dataset.color || 'rgba(255,255,255,0.12)';
  });
</script>

</body>
</html>
